name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]  # bleeding-edge: free-threading + JIT
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync environment (incl. viz extra for matplotlib tests)
        run: uv sync --extra viz --python ${{ matrix.python-version }}
      - name: Lint (ruff)
        run: uv run ruff check ultragraph tests examples assets
      - name: Test (pytest)
        run: uv run pytest

  free-threading:
    runs-on:ubuntu-latest
    name: free-threading (3.14t)
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync with free-threaded Python 3.14t
        run: uv sync --extra viz --python 3.14t
      - name: Test (pytest, no-GIL)
        run: uv run pytest